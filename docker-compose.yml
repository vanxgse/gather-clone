services:
  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3002:3002"

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
        - NEXT_PUBLIC_BASE_URL
        - NEXT_PUBLIC_BACKEND_URL
        - NEXT_PUBLIC_AGORA_APP_ID
        - APP_CERTIFICATE
        - SERVICE_ROLE
    restart: always
    env_file:
      - ./frontend/.env.local
    ports:
      - "3004:3000"
    depends_on:
      - backend
